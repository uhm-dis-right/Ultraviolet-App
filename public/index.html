<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus | Dashboard</title>
    <style>
        :root { --bg: #0f0f0f; --accent: #7289da; --card: #1a1a1a; --text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        
        /* Navigation & Tabs */
        nav { display: flex; justify-content: space-between; align-items: center; background: #050505; padding: 1rem 2rem; border-bottom: 2px solid var(--accent); }
        .logo { font-size: 1.5rem; font-weight: bold; }
        .logo span { color: var(--accent); }
        .tabs { display: flex; gap: 15px; }
        .tab-btn { background: transparent; color: white; border: 1px solid transparent; padding: 8px 16px; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .tab-btn:hover, .tab-btn.active { background: #222; border-color: var(--accent); }

        /* Content Sections */
        .tab-content { display: none; padding: 2rem; }
        .tab-content.active { display: block; }
        .section-title { font-size: 1.8rem; margin-bottom: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 10px; }

        /* Grid for Games & Apps */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid #333; text-align: center; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card img { width: 100%; height: 130px; object-fit: cover; }
        .card h3 { font-size: 1rem; margin: 12px 0; }

        /* Browser/Proxy Tab */
        .proxy-container { text-align: center; padding: 4rem 1rem; }
        .proxy-container input { width: 70%; max-width: 600px; padding: 15px; border-radius: 25px; border: 2px solid #333; outline: none; background: #111; color: white; font-size: 1rem; }
        .proxy-container input:focus { border-color: var(--accent); }
        .proxy-container button { padding: 15px 30px; border-radius: 25px; border: none; background: var(--accent); color: white; cursor: pointer; font-weight: bold; font-size: 1rem; margin-left: 10px; }

        /* Fullscreen Iframe */
        #frame-container { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1000; }
        iframe { width: 100%; height: 100%; border: none; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: #ff4757; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; z-index: 1001; }
    </style>
    
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
</head>
<body>

<nav>
    <div class="logo">NEXUS<span>.WEB</span></div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('browser')">Browser</button>
        <button class="tab-btn" onclick="switchTab('games')">Games</button>
        <button class="tab-btn" onclick="switchTab('apps')">Apps</button>
    </div>
</nav>

<div id="browser" class="tab-content active">
    <div class="proxy-container">
        <h1>Ultraviolet Proxy Browser</h1>
        <p>Search the web freely. (Requires backend to be running)</p>
        <form id="uv-form">
            <input id="uv-address" type="text" placeholder="Search Google or enter a URL (e.g., discord.com)"/>
            <button type="submit">Browse</button>
        </form>
        <p id="uv-error" style="color: #ff4757; margin-top: 15px;"></p>
    </div>
</div>

<div id="games" class="tab-content">
    <h2 class="section-title">Unblocked Games</h2>
    <div class="grid">
        <div class="card" onclick="openIframe('https://1v1.lol')">
            <img src="https://images.igdb.com/igdb/image/upload/t_cover_big/co2l73.jpg" alt="1v1.lol">
            <h3>1v1.lol</h3>
        </div>
        <div class="card" onclick="openIframe('https://buildnow.gg')">
            <img src="https://assets.nintendo.com/image/upload/c_fill,w_1200/q_auto:best/f_auto/dpr_2.0/ncom/software/switch/70010000057482/6e5d165f14e54497e6e5d996e3c0c3a8" alt="BuildNow.gg">
            <h3>BuildNow.gg</h3>
        </div>
        <div class="card" onclick="openIframe('https://math-evo.github.io/slope/')">
            <img src="https://play-lh.googleusercontent.com/uJWX14yE2E7c9G8x4O-o1E6nZ4W9-Z-2D6n8p9O1R1L-x8nE1u7N9l9O2V-x8nE1u7N9" alt="Slope">
            <h3>Slope</h3>
        </div>
    </div>
</div>

<div id="apps" class="tab-content">
    <h2 class="section-title">Apps (Routes via Ultraviolet)</h2>
    <div class="grid">
        <div class="card" onclick="uvProxy('https://youtube.com')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/ef/Youtube_logo.png" style="object-fit: contain; background: white; padding: 10px;" alt="YouTube">
            <h3>YouTube</h3>
        </div>
        <div class="card" onclick="uvProxy('https://tiktok.com')">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/a/a9/TikTok_logo.svg/1200px-TikTok_logo.svg.png" style="object-fit: contain; background: white; padding: 10px;" alt="TikTok">
            <h3>TikTok</h3>
        </div>
        <div class="card" onclick="uvProxy('https://discord.com/app')">
            <img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" style="object-fit: contain; background: white; padding: 10px;" alt="Discord">
            <h3>Discord</h3>
        </div>
    </div>
</div>

<div id="frame-container">
    <button class="close-btn" onclick="closeIframe()">X Close</button>
    <iframe id="viewer"></iframe>
</div>

<script>
    // Tab Switching Logic
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    // Standard Iframe opener (For regular web games)
    function openIframe(url) {
        document.getElementById('frame-container').style.display = 'block';
        document.getElementById('viewer').src = url;
    }

    function closeIframe() {
        document.getElementById('frame-container').style.display = 'none';
        document.getElementById('viewer').src = '';
    }

    // Ultraviolet Proxy Logic
    const form = document.getElementById('uv-form');
    const input = document.getElementById('uv-address');
    const errorText = document.getElementById('uv-error');

    // Helper to format URLs properly
    function search(input, template) {
        try {
            return new URL(input).toString();
        } catch (err) { }
        try {
            const url = new URL(`http://${input}`);
            if (url.hostname.includes(".")) return url.toString();
        } catch (err) { }
        return template.replace("%s", encodeURIComponent(input));
    }

    // Triggers when you click an App or hit enter in the Browser tab
    async function uvProxy(urlStr) {
        errorText.textContent = '';
        try {
            // This attempts to register the Ultraviolet Service Worker
            await navigator.serviceWorker.register('./uv/sw.js', {
                scope: __uv$config.prefix
            });
            
            let url = search(urlStr, 'https://www.google.com/search?q=%s');
            let encodedUrl = __uv$config.prefix + __uv$config.encodeUrl(url);
            
            openIframe(encodedUrl);
        } catch (err) {
            errorText.textContent = "Error: Ultraviolet backend is not running. You must host this file on a Node.js server with UV installed.";
            console.error(err);
        }
    }

    // Attach submit event to form
    form.addEventListener('submit', async (event) => {
        event.preventDefault();
        uvProxy(input.value);
    });
</script>

</body>
</html>
